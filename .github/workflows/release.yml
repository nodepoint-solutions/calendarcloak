name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build archive
        run: |
          xcodebuild archive \
            -project BeeBusy.xcodeproj \
            -scheme BeeBusy \
            -configuration Release \
            -archivePath build/BeeBusy-${{ matrix.arch }}.xcarchive \
            ARCHS=${{ matrix.arch }} \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/BeeBusy-${{ matrix.arch }}.xcarchive \
            -exportPath build/export-${{ matrix.arch }} \
            -exportOptionsPlist ExportOptions.plist

      - name: Ad-hoc codesign
        run: |
          codesign --sign - --deep --force --options runtime \
            build/export-${{ matrix.arch }}/BeeBusy.app

      - name: Package as DMG
        run: |
          hdiutil create \
            -volname "Bee Busy" \
            -srcfolder build/export-${{ matrix.arch }}/BeeBusy.app \
            -ov \
            -format UDZO \
            build/BeeBusy-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeeBusy-${{ matrix.arch }}
          path: build/BeeBusy-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: BeeBusy-arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: BeeBusy-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.dmg

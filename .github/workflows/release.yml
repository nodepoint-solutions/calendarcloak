name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (arm64)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build archive
        run: |
          xcodebuild archive \
            -project CalendarCloak.xcodeproj \
            -scheme CalendarCloak \
            -configuration Release \
            -archivePath build/CalendarCloak-arm64.xcarchive \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          mkdir -p build/export-arm64
          cp -R build/CalendarCloak-arm64.xcarchive/Products/Applications/CalendarCloak.app \
            build/export-arm64/

      - name: Ad-hoc codesign
        run: |
          codesign --sign - --deep --force --options runtime \
            --entitlements CalendarCloak/CalendarCloak.entitlements \
            build/export-arm64/CalendarCloak.app

      - name: Package as DMG
        run: |
          mkdir -p build/dmg-staging
          cp -R build/export-arm64/CalendarCloak.app build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications
          hdiutil create \
            -volname "CalendarCloak" \
            -srcfolder build/dmg-staging \
            -ov \
            -format UDZO \
            build/CalendarCloak-${{ steps.version.outputs.version }}-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalendarCloak-arm64
          path: build/CalendarCloak-${{ steps.version.outputs.version }}-arm64.dmg

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: CalendarCloak-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.dmg

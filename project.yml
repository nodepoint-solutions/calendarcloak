name: CalendarCloak
options:
  bundleIdPrefix: com.nodepoint
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
targets:
  CalendarCloak:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: CalendarCloak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nodepoint.calendar-cloak
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: CalendarCloak/Info.plist
        CODE_SIGN_ENTITLEMENTS: CalendarCloak/CalendarCloak.entitlements
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
  CalendarCloakTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: CalendarCloakTests
    dependencies:
      - target: CalendarCloak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nodepoint.calendar-cloak-tests
